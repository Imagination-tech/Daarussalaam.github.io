<!DOCTYPE html>
<html lang="ar">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>كتب العقيدة</title>

<style>
body {
  font-family: Arial;
  background:#f9f9f9;
  margin:0;
  padding:0;
}

/* HEADER */
header {
  background:#008080;
  color:white;
  padding:20px;
  text-align:center;
}

/* SEARCH */
.search-box {
  text-align:center;
  margin:20px;
}

.search-box input {
  padding:12px;
  width:60%;
  max-width:400px;
  border:2px solid #008080;
  border-radius:25px;
  outline:none;
}

/* GRID */
.book-grid {
  display:flex;
  flex-wrap:wrap;
  justify-content:center;
  gap:20px;
  margin:30px;
}

/* BOOK */
.book {
  background:white;
  width:160px;
  padding:10px;
  border-radius:10px;
  border:1px solid #ccc;
  text-align:center;
  box-shadow:0 2px 8px rgba(0,0,0,0.08);
  transition:0.3s;
}

.book:hover {
  transform:scale(1.05);
}

.book img {
  width:100%;
  height:180px;
  object-fit:cover;
  border-radius:5px;
}

/* BUTTON */
.order-btn {
  display:inline-block;
  margin-top:8px;
  padding:6px 10px;
  background:#008080;
  color:white;
  text-decoration:none;
  border-radius:5px;
}

.order-btn:hover {
  background:#005f5f;
}

/* NO RESULT */
#noResult {
  text-align:center;
  color:red;
  font-weight:bold;
  display:none;
}
</style>
</head>

<body>

<header>

</header>
